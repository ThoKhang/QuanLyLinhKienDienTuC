spring.application.name=LinhKienBackend
# ===============================
# 1. C\u1ea4U H\u00ccNH SERVER PORT
# ===============================
server.port=8080

# ===============================
# 2. C\u1ea4U H\u00ccNH K\u1ebeT N\u1ed0I SQL SERVER
# ===============================
# L\u01b0u \u00fd: Thay \u0111\u1ed5i 'WebLinhKien' th\u00e0nh t\u00ean Database \u0111\u00fang c\u1ee7a b\u1ea1n trong SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=WebLinhKien;encrypt=true;trustServerCertificate=true;

# Thay sa b\u1eb1ng t\u00ean \u0111\u0103ng nh\u1eadp SQL Server c\u1ee7a b\u1ea1n
spring.datasource.username=sa

# Thay m\u1eadt kh\u1ea9u t\u01b0\u01a1ng \u1ee9ng c\u1ee7a t\u00e0i kho\u1ea3n sa
spring.datasource.password=123

spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# 3. C\u1ea4U H\u00ccNH JPA (HIBRANATE)
# ===============================
# none: Kh\u00f4ng t\u1ef1 \u0111\u1ed9ng t\u1ea1o b\u1ea3ng (V\u00ec ch\u00fang ta \u0111\u00e3 ch\u1ea1y script SQL b\u1eb1ng tay r\u1ed3i)
spring.jpa.hibernate.ddl-auto=none
# In c\u00e1c c\u00e2u l\u1ec7nh SQL ra m\u00e0n h\u00ecnh console \u0111\u1ec3 d\u1ec5 debug
spring.jpa.show-sql=true

# ===============================
# 4. C\u1ea4U H\u00ccNH B\u1ea2O M\u1eacT JWT
# ===============================
# Chu\u1ed7i b\u00ed m\u1eadt \u0111\u1ec3 m\u00e3 h\u00f3a token (B\u1ea1n c\u00f3 th\u1ec3 \u0111\u1ed5i th\u00e0nh b\u1ea5t k\u1ef3 chu\u1ed7i n\u00e0o d\u00e0i d\u00e0i m\u1ed9t ch\u00fat)
jwt.secret=DayLaMotChuoiBiMatRatDaiVaAnToanChoDuAnWebLinhKienDienTuCuaKhang
# Th\u1eddi gian s\u1ed1ng c\u1ee7a token: 1 ng\u00e0y (86400000 milliseconds)
jwt.expiration=86400000

# ===============================
# 5. C\u1ea4U H\u00ccNH UPLOAD FILE
# ===============================
# Dung l\u01b0\u1ee3ng t\u1ed1i \u0111a c\u1ee7a 1 file (v\u00ed d\u1ee5: 5MB)
spring.servlet.multipart.max-file-size=5MB
# T\u1ed5ng dung l\u01b0\u1ee3ng t\u1ed1i \u0111a c\u1ee7a m\u1ed9t l\u1ea7n g\u1eedi request
spring.servlet.multipart.max-request-size=10MB
spring.jpa.hibernate.ddl-auto=update